name: Bundle Code to BIA's Repo

on:
  push:
    branches:
      - demo
  workflow_dispatch:

jobs:
  bundle_code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v2
        with:
          repository: parallelscore/bia-rabbitmq-service
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: demo

      - name: Checkout Destination Repo
        uses: actions/checkout@v3
        with:
          repository: bia-blackspring/bia-rabbitmq-service
          token: ${{ secrets.DESTINATION_REPO_TOKEN }}
          path: destination-repo
          ref: main
          fetch-depth: 0

      - name: Copy Source Code to Destination Repo
        run: |
          rsync -av --progress --exclude destination-repo --exclude '.git/' . destination-repo/

      - name: Configure Git Identity
        run: |
          git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USER_NAME }}"

      - name: Push Bundle to Destination Repo
        run: |
          cd destination-repo
          git remote set-url origin "${{ secrets.DESTINATION_REPO_URL }}"
          git add .
          git commit -m "Automated bundle update on merge" || echo "No changes to commit"
          git push origin main
